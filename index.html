    <!--
      Fonts mirror the pam-brides Nobu Weddings prototype:
        · Body / UI:  Poppins (300 / 400 / 500 / 600, normal + italic)
        · Editorial:  Cormorant Garamond (400, normal + italic)
        · Display:    Playfair Display (400, normal + italic)
      Isabella Grand stays available as a back-compat fallback for any
      remaining .font-title usage (declared as @font-face inside
      src/styles/rcd-tokens.css), but the Nobu-side brand voice is
      Cormorant + Playfair to match the wedding-side experience.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap"
